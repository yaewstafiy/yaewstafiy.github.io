<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мое портфолио</title>
</head>

<body>

  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
    }

    .image-container {
      background-image: url(images/pattern-geometric-grid.png);
      height: 100%;
      width: 100%;
      animation: movePictures 10s linear infinite;
    }

    @keyframes movePictures {
      0% {
        background-position: 0 0;
      }

      100% {
        background-position: 300px 0;
      }
    }

    li {
      list-style: none;
    }

    a {
      color: inherit;
      text-decoration: none;
      transition: all .3s;
    }

    a:hover {
      color: white;
      background: #000;
      padding: 8px;
      border-radius: 15px;
    }

    .container {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      font-family: 'Roboto', sans-serif;
      font-size: 20px;
      line-height: 24px;
      font-weight: normal;
      max-width: 300px;
      margin: 0 auto;
      text-align: center;
      background-color: rgb(194 255 220 / 96%);
      box-shadow: 0px 0px 30px 13px #000;
      position: relative;
    }

    .title {
      margin-bottom: 50px;
      font-size: 50px;
      line-height: 60px;
    }

    li+li {
      margin-top: 25px;
    }

    .footer {
      font-size: 16px;
      line-height: 20px;
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding-bottom: 10px;
    }

    li:nth-child(1) a:hover {
      background: #ff54a6;
    }

    li:nth-child(2) a:hover {
      background: #fe3e57;
    }

    li:nth-child(3) {
      -webkit-background-clip: text;
      background-clip: text;
    }

    li:nth-child(3) a:hover {
      background: linear-gradient(180deg, #BC10D8 0%, rgba(80, 0, 250, 0.93)100%)
    }

    li:nth-child(4) a:hover {
      background: #4f9cf9;
    }
  </style>

  <div class="image-container">
    <div class="container">
      <h1 class="title">
        Welcome to my portfolio
      </h1>

      <ul>
        <li>
          <a href="projects/delivery/app/index.html" target="_blank">
            Delivery page
          </a>
        </li>
        <li>
          <a href="projects/new_project/app/index.html" target="_blank">
            Internet-shop
          </a>
        </li>
        <li>
          <a href="projects/oculus/app/index.html" target="_blank">
            Oculus page
          </a>
        </li>
        <li>
          <a href="projects/whitespace/app/index.html" target="_blank">
            Whitespace
          </a>
        </li>
      </ul>

      <footer class="footer">
        2023 © all rights reserved
      </footer>
    </div>
  </div>

</body>

</html>
